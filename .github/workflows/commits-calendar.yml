name: Generate Commits Calendar SVG

on:
  schedule:
    # Run at midnight every day
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate commits calendar SVG
        env:
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/generate_commits_svg.py

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          if [ -f "assets/github-commits-calendar.svg" ]; then
            git add assets/github-commits-calendar.svg
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "docs: update commits calendar SVG [skip ci]"
              git push
              echo "SVG updated and pushed"
            fi
          else
            echo "SVG file not generated, skipping commit"
          fi
